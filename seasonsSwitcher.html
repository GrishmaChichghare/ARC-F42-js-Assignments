<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seasons Trees</title>
    <link rel="stylesheet" href="seasonsSwitcher.css">
</head>
<body>

    <div class="container">
        <img id="seasonImage" src="https://journeyingtothegoddess.wordpress.com/wp-content/uploads/2012/09/treeinfourseasons.jpg" alt="Season Tree">

        <div class="buttons">
            <button class="spring" onclick="changeSeason('spring')">Spring</button>
            <button class="summer" onclick="changeSeason('summer')">Summer</button>
            <button class="autumn" onclick="changeSeason('autumn')">Autumn</button>
            <button class="winter" onclick="changeSeason('winter')">Winter</button>
        </div>
    </div>

    <script src="seasonsSwitcher.js"></script>
</body>
</html>
