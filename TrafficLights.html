<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Light</title>
    <link rel="stylesheet" href="TrafficLights.css">
</head>
<body>

    <h1>Traffic Light</h1>

    <div class="container">
        <div class="buttons">
            <button onclick="showStop()">Stop</button>
            <button onclick="showReady()">Ready</button>
            <button onclick="showGo()">Go</button>
        </div>

        <div class="traffic-light">
            <div id="red" class="light"></div>
            <div id="yellow" class="light"></div>
            <div id="green" class="light"></div>
        </div>
    </div>

    <script src="TrafficLights.js"></script>
</body>
</html>
