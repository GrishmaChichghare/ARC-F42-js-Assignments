<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Like Button App</title>
    <link rel="stylesheet" href="LikeButton.css">

    <!-- Font Awesome for Like Icon -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="container">
        <img
            src="https://static.vecteezy.com/system/resources/thumbnails/048/775/730/small/cute-shih-tzu-dog-in-pink-sweatshirt-and-sunglasses-on-pastel-background-photo.jpg"
            alt="Puppy"
            class="dog-image"
        />

        <div class="buttons-container">
            <i id="likeIcon" class="fa-solid fa-thumbs-up like-icon"></i>

            <button id="likeBtn" class="like-btn">
                Like
            </button>
        </div>
    </div>

    <script src="LikeButton.js"></script>
</body>
</html>
